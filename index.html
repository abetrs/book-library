<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Library — a minimalist reading dashboard</title>
<meta name="description" content="A minimalist, static reading dashboard. Build a reading list and browse your Goodreads library with search, genre filters, and automatic book covers. Runs entirely in your browser." />
<meta name="color-scheme" content="light dark" />
<link rel="icon" href="favicon.svg" type="image/svg+xml" />
<link rel="preconnect" href="https://covers.openlibrary.org" />
<link rel="preconnect" href="https://openlibrary.org" />
<link rel="stylesheet" href="styles.css?v=3" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <svg class="logo" viewBox="0 0 32 32" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M16 8.5C13 6.5 8 6 4.5 7v18C8 24 13 24.5 16 26.5 19 24.5 24 24 27.5 25V7C24 6 19 6.5 16 8.5Z" />
        <path d="M16 8.5v18" />
      </svg>
      <span>LIBRARY</span>
    </div>
    <nav class="tabs" id="tabs">
      <button class="tab is-active" data-tab="reading">Reading List</button>
      <button class="tab" data-tab="goodreads">Goodreads</button>
    </nav>
    <div class="count" id="count"></div>
  </header>

  <div class="controls">
    <div class="search-wrap">
      <input id="search" type="search" placeholder="Search title or author" autocomplete="off" spellcheck="false" />
    </div>
    <div class="control-row">
      <label class="field">
        <span>Author</span>
        <select id="authorFilter"><option value="">All</option></select>
      </label>
      <label class="field">
        <span>Status</span>
        <select id="statusFilter">
          <option value="">All</option>
          <option value="read">Read</option>
          <option value="unread">Unread</option>
          <option value="primary">Primary source</option>
        </select>
      </label>
      <label class="field">
        <span>Sort</span>
        <select id="sortBy">
          <option value="curated">Curated</option>
          <option value="title">Title A–Z</option>
          <option value="author">Author A–Z</option>
        </select>
      </label>
      <label class="field toggle">
        <span>View</span>
        <button id="viewToggle" type="button" data-view="grid">Grid</button>
      </label>
      <div class="field-actions">
        <button id="importMore" type="button" class="act-btn" hidden>Import CSV</button>
        <button id="addBook" type="button" class="act-btn act-add">+ Add book</button>
      </div>
    </div>
    <div class="tagbar" id="tagbar"></div>
  </div>
  <input type="file" id="importMoreInput" accept=".csv,text/csv" hidden />

  <main id="results" class="grid"></main>

  <div id="empty" class="empty" hidden>
    <p>No books match your filters.</p>
  </div>

  <!-- Goodreads import overlay content is injected when needed -->

  <footer class="foot">
    <span id="footNote"></span>
  </footer>

  <div id="modalHost"></div>
  <div id="toast" class="toast" hidden></div>

  <script src="data/readinglist.js?v=9"></script>
  <script src="data/goodreads.js?v=9"></script>
  <script src="app.js?v=9"></script>
</body>
</html>
